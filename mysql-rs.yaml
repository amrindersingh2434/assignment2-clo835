apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: mysql-rs
  namespace: web-as  # Use the SAME namespace as your web app so they can talk!
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "pw"
        - name: MYSQL_DATABASE
          value: "employees"  # Usually required by assignment apps
        ports:
        - containerPort: 3306
