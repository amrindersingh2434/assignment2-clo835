apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  namespace: mysql-as
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
      - name: mysql
        image: 225180847770.dkr.ecr.us-east-1.amazonaws.com/clo835-mysql:8.0
        ports:
      - containerPort: 3306
	env:
          - name: MYSQL_ROOT_PASSWORD
            value: "pw"

