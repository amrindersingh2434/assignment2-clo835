apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: web-rs
  namespace: web-as
spec:
  replicas: 3
  selector:
    matchLabels:
      app: employees
  template:
    metadata:
      labels:
        app: employees
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: employees
        image: 225180847770.dkr.ecr.us-east-1.amazonaws.com/clo835-app:v4
        ports:
        - containerPort: 8080
        env:
        - name: APP_COLOR
          value: "blue"
        - name: DBHOST
          value: "mysql-service.mysql-as.svc.cluster.local"
        - name: DBPORT
          value: "3306"
        - name: DBUSER
          value: "root"
        - name: DBPWD
          value: "pw"
        - name: DATABASE
          value: "employees"

