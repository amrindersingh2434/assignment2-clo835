apiVersion: v1
kind: Pod
metadata:
  name: mysql-pod
  namespace: mysql-as
  labels:
    app: mysql

   spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
      - name: mysql    
        image: 225180847770.dkr.ecr.us-east-1.amazonaws.com/clo835-mysql:8.0
        ports:
      - containerPort: 3306
        env:
          - name: MYSQL_ROOT_PASSWORD
            value: "pw"
