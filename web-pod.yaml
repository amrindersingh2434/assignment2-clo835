apiVersion: v1
kind: Pod
metadata:
  name: employees-pod
  namespace: web-as
  labels:
    app: employees
spec:
  imagePullSecrets:
    - name: ecr-secret
  containers:
    - name: employees
      image: 225180847770.dkr.ecr.us-east-1.amazonaws.com/clo835-app:v4
      ports:
        - containerPort: 8080
      env:
        - name: APP_COLOR
          value: "blue"
        - name: DBHOST
          value: "mysql-service.mysql-as.svc.cluster.local"
        - name: DBPORT
          value: "3306"
        - name: DBUSER
          value: "root"
        - name: DBPWD
          value: "pw"
        - name: DATABASE
          value: "employees"
